<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Brain Tumor Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🧠 Brain Tumor Detection</h1>

        <p>
            Upload an MRI Brain Scan Image to Predict
            the Tumor Type using Deep Learning.
        </p>

        <form action="/predict"
              method="POST"
              enctype="multipart/form-data">

            <div class="upload-box">

                <input
                    type="file"
                    name="image"
                    id="image"
                    accept="image/*"
                    required>

            </div>

            <br>

            <button type="submit">

                Predict Tumor

            </button>

        </form>

    </div>

</div>

</body>

</html>
